# Deploy do app web (Expo export estático) para GitHub Pages.
#
# Primeira vez no repositório:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions" (obrigatório).
#   Sem isso o job deploy pode falhar ao publicar.
#
# Secrets (Settings → Secrets and variables → Actions):
#   EXPO_PUBLIC_TRPC_URL — URL pública do tRPC na EC2 (ex.: https://api.uniaolocacar.com.br/trpc)
#   EXPO_BASE_URL — "/" para domínio customizado na raiz (uniaolocacar.com.br); omita para github.io/<repo>/
#   EXPO_PUBLIC_SITE_URL — opcional; ex.: https://uniaolocacar.com.br (ajuda o build a usar baseUrl "/")
#
name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

# cancel-in-progress: true cancela o job no Actions, mas o deploy no backend do Pages
# pode continuar — o próximo run fica preso em deployment_queued até dar timeout (10 min).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Warn if API URL missing
        env:
          TRPC: ${{ secrets.EXPO_PUBLIC_TRPC_URL }}
        run: |
          if [ -z "$TRPC" ]; then
            echo "::warning::Defina o secret EXPO_PUBLIC_TRPC_URL (URL do tRPC na EC2) para o app web funcionar."
          fi

      - name: Export web build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPO_PUBLIC_TRPC_URL: ${{ secrets.EXPO_PUBLIC_TRPC_URL }}
          EXPO_BASE_URL: ${{ secrets.EXPO_BASE_URL }}
          EXPO_PUBLIC_SITE_URL: ${{ secrets.EXPO_PUBLIC_SITE_URL }}
        run: npm run predeploy -w mobile

      - name: SPA fallback (GitHub Pages)
        run: cp mobile/dist/index.html mobile/dist/404.html

      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      # Re-run do workflow acumula artefatos "github-pages" no mesmo run; deploy-pages exige 1 só.
      - name: Remove duplicate Pages artifacts (re-run safe)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
            });
            const pages = data.artifacts.filter((a) => a.name === "github-pages");
            for (const artifact of pages) {
              core.info(`Deleting artifact ${artifact.id} (${artifact.name})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # Falhas intermitentes (deployment_queued / purging_cdn) são comuns; uma nova tentativa costuma resolver.
        continue-on-error: true

      - name: Retry deploy (Pages API timeout)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4

      - name: Fail if deploy did not succeed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: exit 1
