# Deploy do app web (Expo export estático) para GitHub Pages.
#
# Primeira vez no repositório:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions" (obrigatório).
#   Sem isso o job deploy pode falhar ao publicar.
#
# Secrets (Settings → Secrets and variables → Actions):
#   EXPO_PUBLIC_TRPC_URL — URL pública do tRPC no Railway (ex.: https://xxx.up.railway.app/trpc)
#   EXPO_BASE_URL — "/" para domínio customizado na raiz (uniaolocacar.com.br); omita para github.io/<repo>/
#   EXPO_PUBLIC_SITE_URL — opcional; ex.: https://uniaolocacar.com.br (ajuda o build a usar baseUrl "/")
#
# Nota: o passo "configure-pages" foi omitido de propósito — ele falha com 404 até Pages existir
# e não é necessário para upload-pages-artifact + deploy-pages com arquivos estáticos.
#
name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Warn if API URL missing
        env:
          TRPC: ${{ secrets.EXPO_PUBLIC_TRPC_URL }}
        run: |
          if [ -z "$TRPC" ]; then
            echo "::warning::Defina o secret EXPO_PUBLIC_TRPC_URL (URL do tRPC no Railway) para o app web funcionar."
          fi

      - name: Export web build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPO_PUBLIC_TRPC_URL: ${{ secrets.EXPO_PUBLIC_TRPC_URL }}
          EXPO_BASE_URL: ${{ secrets.EXPO_BASE_URL }}
          EXPO_PUBLIC_SITE_URL: ${{ secrets.EXPO_PUBLIC_SITE_URL }}
        run: npm run predeploy -w mobile

      # Páginas estáticas + gzip + loader identity no index.html (GitHub Pages gzip/404 bug)

      - name: SPA fallback (GitHub Pages)
        run: cp mobile/dist/index.html mobile/dist/404.html

      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
