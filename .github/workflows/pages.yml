# Deploy do app web (Expo export estático) para GitHub Pages.
#
# Publica via push na branch `gh-pages` (sem a API deploy-pages, que estava
# travando em deployment_queued até timeout de 10 min).
#
# Após o PRIMEIRO deploy bem-sucedido com este workflow:
#   Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   Branch: gh-pages / (root)   ← substituir "GitHub Actions"
#
# Settings → Actions → General → Workflow permissions: "Read and write permissions"
# (necessário para o GITHUB_TOKEN publicar na branch gh-pages).
#
# Secrets (Settings → Secrets and variables → Actions):
#   EXPO_PUBLIC_TRPC_URL — URL pública do tRPC na EC2 (ex.: https://api.uniaolocacar.com.br/trpc)
#   EXPO_BASE_URL — "/" para domínio customizado na raiz (uniaolocacar.com.br)
#   EXPO_PUBLIC_SITE_URL — opcional; ex.: https://uniaolocacar.com.br
#
name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Warn if API URL missing
        env:
          TRPC: ${{ secrets.EXPO_PUBLIC_TRPC_URL }}
        run: |
          if [ -z "$TRPC" ]; then
            echo "::warning::Defina o secret EXPO_PUBLIC_TRPC_URL (URL do tRPC na EC2) para o app web funcionar."
          fi

      - name: Export web build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXPO_PUBLIC_TRPC_URL: ${{ secrets.EXPO_PUBLIC_TRPC_URL }}
          EXPO_BASE_URL: ${{ secrets.EXPO_BASE_URL }}
          EXPO_PUBLIC_SITE_URL: ${{ secrets.EXPO_PUBLIC_SITE_URL }}
        run: npm run predeploy -w mobile

      - name: SPA fallback (GitHub Pages)
        run: cp mobile/dist/index.html mobile/dist/404.html

      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/dist
          cname: uniaolocacar.com.br
          force_orphan: true
